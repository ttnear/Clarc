name: Build MiniClarc

# CI for the MiniClarc (dttxorg/MiniClarc) hard-fork distribution.
# Distinct from upstream ttnear/Clarc — see NOTICE and FORK.md.
#
# Triggers:
#   - Tag push matching v* (e.g. v2.0.0): build + sign + zip + GitHub Release
#   - Manual dispatch (workflow_dispatch): build + sign + zip, attach to a "fork-preview" run
#
# This workflow does NOT notarize (no Apple Developer ID available in fork).
# The output is ad-hoc-signed; users will need to right-click → Open on first launch.
# This is a fork convenience build, not a redistribution channel.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.3.2-fork.1)'
        required: true
        default: '1.3.2-fork.1'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show resolved version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building MiniClarc v$VERSION"

      - name: Select Xcode
        # Package.swift declares swift-tools-version 6.2, which Xcode 16.0/16.1
        # don't ship (they have Swift 6.0). macos-15's default is Xcode 16.4,
        # which works. Walk the label list newest → oldest.
        run: |
          set -eux
          for label in \
            "/Applications/Xcode_26.3.app" \
            "/Applications/Xcode_26.2.app" \
            "/Applications/Xcode_26.1.1.app" \
            "/Applications/Xcode_26.0.1.app" \
            "/Applications/Xcode_16.4.app" \
            "/Applications/Xcode_16.3.app" \
            "/Applications/Xcode_16.2.app" \
            "/Applications/Xcode_16.1.app" \
            "/Applications/Xcode_16.app"
          do
            if [ -d "$label" ]; then
              echo "Selecting $label"
              sudo xcode-select -s "$label/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          swift --version

      - name: Build (Release, ad-hoc signed)
        run: |
          set -euxo pipefail
          mkdir -p build
          xcodebuild \
            -project Clarc.xcodeproj \
            -scheme Clarc \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build/DerivedData \
            build | tee build/xcodebuild.log
          # Locate the produced .app
          APP_PATH=$(find build/DerivedData/Build/Products/Release -maxdepth 2 -name "Clarc.app" -type d | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Clarc.app not found under build/DerivedData/Build/Products/Release"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Built: $APP_PATH"

      - name: Package zip
        run: |
          set -euxo pipefail
          ZIP_NAME="Clarc-${{ steps.version.outputs.version }}.zip"
          # Match upstream's safe-zip flags (see scripts/build_zip.sh comment re: AppleDouble)
          ditto -c -k --keepParent --norsrc --noextattr --noqtn \
            "$APP_PATH" \
            "build/$ZIP_NAME"
          ls -lh "build/$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: clarc-fork-build
          path: build/Clarc-*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "MiniClarc ${{ steps.version.outputs.version }}"
          draft: true
          generate_release_notes: true
          body: |
            ## MiniClarc — 中文社区增强版

            This build is produced by the [dttxorg/MiniClarc](https://github.com/dttxorg/MiniClarc)
            hard-fork distribution. It is **not** an official upstream Clarc release; it
            is independently maintained under the same Apache License 2.0. See
            [`FORK.md`](https://github.com/dttxorg/MiniClarc/blob/main/FORK.md) and
            [`NOTICE`](https://github.com/dttxorg/MiniClarc/blob/main/NOTICE) in the
            source tree for the full attribution.

            **What's in this build**
            - All upstream Clarc features carried forward.
            - **Full Access** permission mode (auto-approves every tool call).
            - **Phase-based auto-collapse** for completed thinking / tool_use /
              tool_result blocks (final text response stays expanded).
            - **Configurable fold threshold** for long chat histories (8 / 15 / 30 / Off).
            - **Focus Mode fix** — no more frozen chat view when focus mode is on.
            - **i18n** — PermissionModal countdown, fold threshold picker, phase labels,
              and permission descriptions localized in en / zh-Hans / ko.

            **Install**
            1. Download `Clarc-${{ steps.version.outputs.version }}.zip` below.
            2. Unzip and drag `MiniClarc.app` to `/Applications`.
            3. On first launch, right-click `MiniClarc.app` → **Open** → confirm the
               Gatekeeper prompt (the build is **ad-hoc signed**, not notarized with
               an Apple Developer ID).
            4. After the first launch, normal double-click works.
            5. The bundle id is `com.dttxorg.MiniClarc`, distinct from upstream
               `com.idealapp.Clarc`. The two can coexist on the same Mac.

            **Caveats**
            - Sparkle `SUPublicEDKey` is empty in v2.0.0. Update checks still work,
              but signatures are not yet verified. Download only from this fork's
              Releases page; do not trust third-party mirrors.
            - No Apple notarization. macOS Gatekeeper will require the
              right-click-open workaround on every fresh install.
            - This distribution does not track upstream releases 1:1. If you need a
              specific upstream feature, file an issue on dttxorg/MiniClarc.
          files: |
            build/Clarc-*.zip
